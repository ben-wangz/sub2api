{{- if and (not .Values.secrets.existingSecret) .Values.secrets.bootstrap.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sub2api.fullname" . }}-secret-bootstrap
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-10"
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: secret-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sub2api.fullname" . }}-secret-bootstrap
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-10"
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: secret-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sub2api.fullname" . }}-secret-bootstrap
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-10"
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: secret-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "sub2api.fullname" . }}-secret-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sub2api.fullname" . }}-secret-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sub2api.fullname" . }}-secret-bootstrap
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: secret-bootstrap
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.podLabels "context" $ ) | nindent 8 }}
        app.kubernetes.io/component: secret-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "sub2api.fullname" . }}-secret-bootstrap
      containers:
        - name: bootstrap
          image: {{ include "common.images.image" ( dict "imageRoot" .Values.secrets.bootstrap.image "global" .Values.global ) }}
          imagePullPolicy: {{ .Values.secrets.bootstrap.image.pullPolicy }}
          env:
            - name: SECRET_NAME
              value: {{ include "sub2api.envSecretName" . | quote }}
            - name: NAMESPACE
              value: {{ include "common.names.namespace" . | quote }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.admin.password | quote }}
            - name: JWT_SECRET
              value: {{ .Values.auth.jwtSecret | quote }}
            - name: TOTP_ENCRYPTION_KEY
              value: {{ .Values.auth.totpEncryptionKey | quote }}
            - name: REDIS_AUTH_ENABLED
              value: {{ ternary "true" "false" .Values.redis.auth.enabled | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.auth.password | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.password | quote }}
            - name: POSTGRES_POSTGRES_PASSWORD
              value: ""
          command:
            - /bin/sh
            - -ec
            - |
              rand_alnum() {
                len="$1"
                # shellcheck disable=SC2002
                LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c "${len}"
              }

              if kubectl -n "${NAMESPACE}" get secret "${SECRET_NAME}" >/dev/null 2>&1; then
                echo "secret exists: ${SECRET_NAME}"
                exit 0
              fi

              admin_password="${ADMIN_PASSWORD}"
              jwt_secret="${JWT_SECRET}"
              totp_key="${TOTP_ENCRYPTION_KEY}"

              if [ -z "${admin_password}" ]; then admin_password="$(rand_alnum 24)"; fi
              if [ -z "${jwt_secret}" ]; then jwt_secret="$(rand_alnum 64)"; fi
              if [ -z "${totp_key}" ]; then totp_key="$(rand_alnum 32)"; fi

              db_password="${POSTGRES_PASSWORD}"
              if [ -z "${db_password}" ]; then db_password="$(rand_alnum 32)"; fi
              postgres_password="$(rand_alnum 32)"

              redis_password=""
              if [ "${REDIS_AUTH_ENABLED}" = "true" ]; then
                redis_password="${REDIS_PASSWORD}"
                if [ -z "${redis_password}" ]; then redis_password="$(rand_alnum 32)"; fi
              fi

              kubectl -n "${NAMESPACE}" create secret generic "${SECRET_NAME}" \
                --from-literal=ADMIN_PASSWORD="${admin_password}" \
                --from-literal=JWT_SECRET="${jwt_secret}" \
                --from-literal=TOTP_ENCRYPTION_KEY="${totp_key}" \
                --from-literal=DATABASE_PASSWORD="${db_password}" \
                --from-literal=password="${db_password}" \
                --from-literal=postgres-password="${postgres_password}" \
                --from-literal=REDIS_PASSWORD="${redis_password}" \
                --from-literal=redis-password="${redis_password}"

              echo "secret created: ${SECRET_NAME}"
{{- end }}
