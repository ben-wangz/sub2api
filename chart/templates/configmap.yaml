{{- if not .Values.secrets.existingConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sub2api.envConfigMapName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: server
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  AUTO_SETUP: {{ ternary "true" "false" .Values.env.autoSetup | quote }}
  SERVER_HOST: {{ .Values.env.serverHost | quote }}
  SERVER_PORT: {{ .Values.env.serverPort | quote }}
  SERVER_MODE: {{ .Values.env.serverMode | quote }}
  RUN_MODE: {{ .Values.env.runMode | quote }}
  TZ: {{ .Values.env.tz | quote }}

  DATABASE_HOST: {{ include "sub2api.databaseHost" . | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_USER: {{ .Values.database.user | quote }}
  DATABASE_DBNAME: {{ .Values.database.dbname | quote }}
  DATABASE_SSLMODE: {{ .Values.database.sslmode | quote }}
  DATABASE_MAX_OPEN_CONNS: {{ .Values.database.maxOpenConns | quote }}
  DATABASE_MAX_IDLE_CONNS: {{ .Values.database.maxIdleConns | quote }}
  DATABASE_CONN_MAX_LIFETIME_MINUTES: {{ .Values.database.connMaxLifetimeMinutes | quote }}
  DATABASE_CONN_MAX_IDLE_TIME_MINUTES: {{ .Values.database.connMaxIdleTimeMinutes | quote }}

  REDIS_HOST: {{ include "sub2api.cacheHost" . | quote }}
  REDIS_PORT: {{ .Values.cache.port | quote }}
  REDIS_DB: {{ .Values.cache.db | quote }}
  REDIS_POOL_SIZE: {{ .Values.cache.poolSize | quote }}
  REDIS_MIN_IDLE_CONNS: {{ .Values.cache.minIdleConns | quote }}
  REDIS_ENABLE_TLS: {{ ternary "true" "false" .Values.cache.enableTls | quote }}

  ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  JWT_EXPIRE_HOUR: {{ .Values.auth.jwtExpireHour | quote }}

  SECURITY_URL_ALLOWLIST_ENABLED: {{ ternary "true" "false" .Values.env.securityUrlAllowlist.enabled | quote }}
  SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP: {{ ternary "true" "false" .Values.env.securityUrlAllowlist.allowInsecureHttp | quote }}
  SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS: {{ ternary "true" "false" .Values.env.securityUrlAllowlist.allowPrivateHosts | quote }}
{{- end }}
